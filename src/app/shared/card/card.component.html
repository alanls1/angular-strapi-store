<div class="card">
  <div class="tag">{{ product?.tag ?? 'Novo' }}</div>
  <img [src]="product?.image?.url ?? 'assets/img/perfil.jpg'" [alt]="product?.name ?? 'foto do produto'" />
  <div class="description">
    <small>{{ product?.category }}</small>
    <h4>{{ product?.name }}</h4>
    <span>{{ product?.price | currency: 'BRL' }}</span>
  </div>
</div>
